<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f5f5f5;
}

h2 {
  text-align: center;
}

.card {
  background: white;
  padding: 15px;
  margin: 10px auto;
  border-radius: 10px;
  max-width: 500px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<h2>📊 All Complaints</h2>

<button onclick="loadData()">Load Complaints</button>

<div id="data"></div>

<script>
async function loadData(){

  const res = await fetch("/api/data");
  const data = await res.json();

  let html = "";

  data.forEach(item => {
    html += `
      <div class="card">
        <b>Name:</b> ${item.name}<br>
        <b>Phone:</b> ${item.phone}<br>
        <b>Complaint:</b> ${item.complaint}
      </div>
    `;
  });

  document.getElementById("data").innerHTML = html;
}
</script>

</body>
</html>
