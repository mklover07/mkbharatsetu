<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<style>
body { font-family: Arial; padding: 20px; }
.box {
  border: 1px solid #000;
  padding: 10px;
  margin: 10px 0;
}
</style>
</head>

<body>

<h1>MK Bharat Setu Admin</h1>

<div id="data">Loading...</div>

<script>
fetch('/api/admin')
.then(res => res.json())
.then(data => {
  let html = "";

  data.forEach(item => {
    html += `
      <div class="box">
        <b>Name:</b> ${item.name}<br>
        <b>Phone:</b> ${item.phone}<br>
        <b>Complaint:</b> ${item.complaint}
      </div>
    `;
  });

  document.getElementById("data").innerHTML = html;
});
</script>

</body>
</html>
