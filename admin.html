<!DOCTYPE html>
<html>
<head>
<title>Admin Dashboard</title>

<style>
body {
  font-family: Arial;
  background: #f4f6f9;
  padding: 20px;
}

h1 {
  text-align: center;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  margin-bottom: 20px;
}

input {
  padding: 10px;
  width: 250px;
}

button {
  padding: 8px 12px;
  margin: 5px;
  border: none;
  cursor: pointer;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 8px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}

.pending { color: orange; }
.solved { color: green; }

</style>
</head>

<body>

<h1>MK Bharat Setu Admin</h1>

<div class="top-bar">
  <input type="text" id="search" placeholder="Search..." onkeyup="loadData()">
  <button onclick="logout()">Logout</button>
</div>

<div id="data"></div>

<script>
const token = localStorage.getItem("token");
if (!token) window.location.href = "/login.html";

async function loadData() {
  const res = await fetch("/api/report");
  const data = await res.json();

  const search = document.getElementById("search").value.toLowerCase();

  let html = "";

  data
    .filter(item =>
      item.name.toLowerCase().includes(search) ||
      item.phone.includes(search)
    )
    .forEach(item => {
      html += `
        <div class="card">
          <b>Name:</b> ${item.name}<br>
          <b>Phone:</b> ${item.phone}<br>
          <b>Complaint:</b> ${item.complaint}<br>
          <b>Status:</b> 
            <span class="${item.status === 'Solved' ? 'solved' : 'pending'}">
              ${item.status}
            </span>
          <br><br>

          <button onclick="updateStatus(${item.id}, 'Solved')">Mark Solved</button>
          <button onclick="deleteItem(${item.id})" style="background:red;color:white;">Delete</button>
        </div>
      `;
    });

  document.getElementById("data").innerHTML = html;
}

async function deleteItem(id) {
  await fetch("/api/report", {
    method: "DELETE",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id })
  });
  loadData();
}

async function updateStatus(id, status) {
  await fetch("/api/report", {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id, status })
  });
  loadData();
}

function logout() {
  localStorage.removeItem("token");
  window.location.href = "/login.html";
}

loadData();
</script>

</body>
</html>
