if(!sessionStorage.getItem("admin")){
  window.location.href="login.html";
}<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<style>
body{font-family:sans-serif;background:#111;color:white;text-align:center;}
table{width:90%;margin:auto;border-collapse:collapse;}
td,th{border:1px solid #555;padding:10px;}
button{padding:5px 10px;margin:3px;}
</style>
</head>

<body>

<h1>Admin Panel</h1>

<button onclick="loadData()">Load Complaints</button>

<table id="table">
<tr>
<th>ID</th>
<th>Name</th>
<th>Complaint</th>
<th>Status</th>
<th>Action</th>
</tr>
</table>

<script>

async function loadData(){
  const res = await fetch("/api/data");
  const data = await res.json();

  let html = `
  <tr>
  <th>ID</th>
  <th>Name</th>
  <th>Complaint</th>
  <th>Status</th>
  <th>Action</th>
  </tr>`;

  data.forEach(d=>{
    html += `
    <tr>
      <td>${d.id}</td>
      <td>${d.name}</td>
      <td>${d.complaint}</td>
      <td>${d.status}</td>
      <td>
        <button onclick="update('${d.id}','Approved')">Approve</button>
        <button onclick="update('${d.id}','Resolved')">Resolve</button>
        <button onclick="del('${d.id}')">Delete</button>
      </td>
    </tr>`;
  });

  document.getElementById("table").innerHTML = html;
}

async function update(id,status){
  await fetch("/api/data",{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id,status})
  });
  loadData();
}

async function del(id){
  await fetch("/api/data",{
    method:"DELETE",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id})
  });
  loadData();
}

</script>

</body>
</html><button onclick="logout()">Logout</button>

<script>
function logout(){
  sessionStorage.removeItem("admin");
  window.location.href="login.html";
}
</script>
