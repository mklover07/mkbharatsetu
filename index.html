<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MK Bharat Setu</title>

<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* HEADER */
.header{
text-align:center;
padding:30px;
font-size:28px;
font-weight:bold;
}

/* NAV */
nav{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
padding:10px;
}

nav button{
background:rgba(255,255,255,0.1);
border:1px solid rgba(255,255,255,0.2);
color:white;
padding:10px 18px;
border-radius:30px;
cursor:pointer;
}

/* SECTION */
.section{
display:none;
padding:20px;
text-align:center;
}

/* CARD */
.card{
background:rgba(255,255,255,0.08);
border-radius:20px;
padding:20px;
margin:15px auto;
width:300px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* INPUT */
input,textarea{
width:90%;
padding:12px;
margin:8px;
border-radius:10px;
border:none;
}

/* BUTTON */
.btn{
background:#00c6ff;
padding:10px 20px;
border:none;
border-radius:20px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
MK Bharat Setu 🇮🇳  
<br><small>Powered by MK Global Nexus</small>
</div>

<nav>
<button onclick="show('home')">Home</button>
<button onclick="show('farmer')">Farmer</button>
<button onclick="show('student')">Student</button>
<button onclick="show('business')">Business</button>
<button onclick="show('complaint')">Complaint</button>
<button onclick="show('admin')">Admin</button>
</nav>

<!-- HOME -->
<div id="home" class="section" style="display:block;">
<h3>One Platform for Every Indian</h3>
<p>Farmers • Students • Business • Public Support</p>
</div>

<!-- FARMER -->
<div id="farmer" class="section">
<div class="card">
<h3>Farmer</h3>
<button class="btn" onclick="openLink('https://pmkisan.gov.in')">Schemes</button>
<button class="btn" onclick="openLink('https://agmarknet.gov.in')">MSP</button>
<button class="btn" onclick="weather()">Weather</button>
<p id="weatherBox"></p>
</div>
</div>

<!-- STUDENT -->
<div id="student" class="section">
<div class="card">
<h3>Student</h3>
<button class="btn" onclick="openLink('https://freejobalert.com')">Jobs</button>
<button class="btn" onclick="openLink('https://ncert.nic.in')">Notes</button>
<button class="btn" onclick="openLink('https://scholarships.gov.in')">Scholarship</button>
</div>
</div>

<!-- BUSINESS -->
<div id="business" class="section">
<div class="card">
<h3>Business</h3>
<button class="btn" onclick="openLink('https://startupindia.gov.in')">Startup</button>
<button class="btn" onclick="openLink('https://economictimes.indiatimes.com')">Market</button>
</div>
</div>

<!-- COMPLAINT -->
<div id="complaint" class="section">

<div class="card">
<h3>Submit Complaint</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<textarea id="text" placeholder="Complaint"></textarea>
<button class="btn" onclick="submit()">Submit</button>
</div>

<div class="card">
<h3>Track Complaint</h3>
<input id="trackId" placeholder="Enter ID">
<button class="btn" onclick="track()">Track</button>
<p id="status"></p>
</div>

</div>

<!-- ADMIN -->
<div id="admin" class="section">
<div class="card">
<h3>All Complaints</h3>
<button class="btn" onclick="load()">Load</button>
<div id="list"></div>
</div>
</div>

<script>

// NAVIGATION
function show(id){
document.querySelectorAll('.section').forEach(s=>s.style.display='none');
document.getElementById(id).style.display='block';
}

// LINKS
function openLink(url){
window.open(url);
}

// WEATHER
async function weather(){
const res=await fetch("https://api.open-meteo.com/v1/forecast?latitude=26.9&longitude=75.8&current_weather=true");
const d=await res.json();
weatherBox.innerHTML="Temp: "+d.current_weather.temperature+"°C";
}

// SUBMIT
async function submit(){
const id="MK"+Date.now();

await fetch("/api/data",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
id,
name:name.value,
phone:phone.value,
complaint:text.value,
status:"Pending"
})
});

alert("Complaint ID: "+id);
}

// TRACK
async function track(){
const res=await fetch("/api/data?id="+trackId.value);
const data=await res.json();

status.innerHTML=data?"Status: "+data.status:"Not Found";
}

// LOAD ALL
async function load(){
const res=await fetch("/api/data");
const data=await res.json();

let html="";
data.forEach(x=>{
html+=`<div>${x.id} - ${x.status}</div>`;
});

list.innerHTML=html;
}

</script>

</body>
</html>
