<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MK Bharat Setu</title>

<style>
body{background:#0f2027;color:white;text-align:center;font-family:sans-serif;}
.section{padding:20px;}
input,textarea,select{padding:10px;margin:5px;border-radius:10px;width:250px;}
button{padding:10px 20px;background:#00c6ff;border:none;border-radius:20px;}
.card{border:1px solid white;margin:10px;padding:10px;border-radius:10px;}
</style>
</head>

<body>

<h2>MK Bharat Setu 🇮🇳</h2>

<!-- SUBMIT -->
<div class="section">
<h3>Submit Complaint</h3>
<input id="name" placeholder="Name"><br>
<input id="phone" placeholder="Phone"><br>
<textarea id="complaint" placeholder="Complaint"></textarea><br>
<button onclick="submit()">Submit</button>
</div>

<!-- TRACK -->
<div class="section">
<h3>Track</h3>
<input id="trackId" placeholder="ID"><br>
<button onclick="track()">Track</button>
<div id="status"></div>
</div>

<!-- ALL -->
<div class="section">
<h3>All Complaints</h3>
<button onclick="load()">Load</button>
<div id="list"></div>
</div>

<!-- UPDATE -->
<div class="section">
<h3>Update Status</h3>
<input id="uid" placeholder="ID"><br>
<select id="ustatus">
<option>Pending</option>
<option>In Review</option>
<option>Resolved</option>
</select><br>
<button onclick="update()">Update</button>
</div>

<script>

// SUBMIT
async function submit(){
  const id="MK"+Date.now();

  await fetch("/api/data",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      id,
      name:name.value,
      phone:phone.value,
      complaint:complaint.value,
      status:"Pending"
    })
  });

  alert("ID: "+id);
}

// TRACK
async function track(){
  const res=await fetch("/api/data");
  const data=await res.json();

  const f=data.find(x=>x.id===trackId.value);
  status.innerHTML=f?"Status: "+f.status:"Not Found";
}

// LOAD ALL
async function load(){
  const res=await fetch("/api/data");
  const data=await res.json();

  let html="";
  data.forEach(x=>{
    html+=`<div class="card">
    ${x.id}<br>${x.name}<br>${x.phone}<br>${x.complaint}<br>${x.status}
    </div>`;
  });

  list.innerHTML=html;
}

// UPDATE
async function update(){
  await fetch("/api/data",{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id:uid.value,status:ustatus.value})
  });

  alert("Updated");
}

</script>

</body>
</html>
