<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MK Bharat Setu</title>

<style>
body{margin:0;font-family:sans-serif;background:#0f2027;color:white;text-align:center;}
.section{padding:20px;}
input,textarea,select{padding:10px;margin:5px;border-radius:10px;border:none;width:250px;}
button{padding:10px 20px;background:#00c6ff;border:none;border-radius:20px;}
.card{border:1px solid white;margin:10px;padding:10px;border-radius:10px;}
</style>
</head>

<body>

<h2>MK Bharat Setu 🇮🇳</h2>

<!-- SUBMIT -->
<div class="section">
<h3>Submit Complaint</h3>
<input id="name" placeholder="Name"><br>
<input id="phone" placeholder="Phone"><br>
<textarea id="complaintText" placeholder="Complaint"></textarea><br>
<button onclick="submitComplaint()">Submit</button>
</div>

<!-- TRACK -->
<div class="section">
<h3>Track Complaint</h3>
<input id="trackId" placeholder="Enter ID"><br>
<button onclick="track()">Track</button>
<div id="statusBox"></div>
</div>

<!-- ADMIN VIEW -->
<div class="section">
<h3>All Complaints</h3>
<button onclick="loadComplaints()">Load</button>
<div id="allData"></div>
</div>

<!-- UPDATE -->
<div class="section">
<h3>Update Status</h3>
<input id="updateId" placeholder="ID"><br>
<select id="newStatus">
<option>Pending</option>
<option>In Review</option>
<option>Resolved</option>
</select><br>
<button onclick="updateStatus()">Update</button>
</div>

<script>

// SUBMIT
async function submitComplaint(){

  const id = "MK" + Math.floor(Math.random()*100000);

  const data = {
    id,
    name:document.getElementById("name").value,
    phone:document.getElementById("phone").value,
    complaint:document.getElementById("complaintText").value,
    status:"Pending"
  };

  await fetch("/api/data",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  });

  alert("Submitted ID: "+id);
}

// TRACK
async function track(){

  const id = document.getElementById("trackId").value.trim();

  const res = await fetch("/api/data");
  const data = await res.json();

  const found = data.find(x=>x.id===id);

  document.getElementById("statusBox").innerHTML =
    found ? "Status: "+found.status : "Not Found ❌";
}

// LOAD ALL
async function loadComplaints(){

  const res = await fetch("/api/data");
  const data = await res.json();

  let html="";

  data.forEach(c=>{
    html+=`
    <div class="card">
    ${c.id}<br>
    ${c.name}<br>
    ${c.phone}<br>
    ${c.complaint}<br>
    Status: ${c.status}
    </div>`;
  });

  document.getElementById("allData").innerHTML=html;
}

// UPDATE
async function updateStatus(){

  const id=document.getElementById("updateId").value;
  const status=document.getElementById("newStatus").value;

  await fetch("/api/data",{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id,status})
  });

  alert("Updated ✅");
}

</script>

</body>
</html>
