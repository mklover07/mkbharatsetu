<!DOCTYPE html>
<html>
<head>
<title>MK Bharat Setu</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

/* Header */
header {
  background: linear-gradient(90deg, #004aad, #007bff);
  color: white;
  padding: 15px;
  text-align: center;
}

/* Navbar */
nav {
  background: #0066cc;
  padding: 10px;
  text-align: center;
}

nav a {
  color: white;
  margin: 10px;
  text-decoration: none;
  font-weight: bold;
}

/* News Bar */
.news-bar {
  background: black;
  color: white;
  padding: 10px;
  text-align: center;
  font-weight: bold;
}

/* Container */
.container {
  padding: 30px;
  text-align: center;
}

/* Cards */
.card {
  display: inline-block;
  background: white;
  padding: 20px;
  margin: 10px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
  box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
}

.card:hover {
  background: #007bff;
  color: white;
  transform: scale(1.05);
}

/* Dynamic Content */
#dynamicContent {
  margin-top: 20px;
  padding: 20px;
  background: white;
  border-radius: 10px;
}
</style>

</head>

<body>

<header>
  <h2>MK Bharat Setu</h2>
</header>

<nav>
  <a href="#">Farmer</a>
  <a href="#">Student</a>
  <a href="#">Business</a>
  <a href="#">Complaint</a>
</nav>

<div class="news-bar">
  <span id="newsFeed">Loading news...</span>
</div>

<div class="container">

<h1>One Platform for Every Indian</h1>

<h2>Farmer Section</h2><div id="farmerData" style="margin-top:20px;"></div>

<div class="card" onclick="loadFarmerData('schemes')">Government Schemes</div>

<div class="card" onclick="loadFarmerData('msp')">MSP Rates</div>

<div class="card" onclick="loadFarmerData('weather')">Weather Updates</div>

<div id="dynamicContent"></div>

</div>

<script>

/* ======================
   Farmer Dynamic System
====================== */

async function loadFarmerData(type) {

  let content = document.getElementById("dynamicContent");
  content.innerHTML = "Loading...";

  if(type === "schemes"){
    content.innerHTML = `
      <h3>Government Schemes</h3>
      <ul>
        <li><a href="https://pmkisan.gov.in/" target="_blank">PM Kisan Yojana</a></li>
        <li><a href="https://enam.gov.in/" target="_blank">e-NAM Portal</a></li>
      </ul>
    `;
  }

  else if(type === "msp"){
    content.innerHTML = `
      <h3>MSP Rates</h3>
      <p>Wheat: ₹2275/quintal</p>
      <p>Rice: ₹2183/quintal</p>
    `;
  }

  else if(type === "weather"){
    try {
      let res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=28.6&longitude=77.2&current_weather=true");
      let data = await res.json();

      content.innerHTML = `
        <h3>Weather Update</h3>
        <p>Temperature: ${data.current_weather.temperature}°C</p>
        <p>Wind Speed: ${data.current_weather.windspeed} km/h</p>
      `;
    } catch (err) {
      content.innerHTML = "Weather API error";
    }
  }

}


/* ======================
   Live News Feed System
====================== */

function loadLiveFeed(){

  const news = [
    "🚜 MSP Rates Updated",
    "📚 New Govt Jobs Released",
    "📈 Market Trending Up",
    "🌦 Weather Alert in India"
  ];

  let i = 0;

  setInterval(()=>{
    document.getElementById("newsFeed").innerText = news[i];
    i = (i + 1) % news.length;
  }, 2000);
}

loadLiveFeed();

</script>

</body>
</html><script>
async function loadFarmerData(type) {
  const container = document.getElementById("farmerData");

  container.innerHTML = "Loading...";

  try {
    const res = await fetch("/api/data");
    const data = await res.json();

    if (type === "schemes") {
      container.innerHTML = `
        <h3>Government Schemes</h3>
        <ul>
          <li><a href="https://pmkisan.gov.in/" target="_blank">PM Kisan</a></li>
          <li><a href="https://soilhealth.dac.gov.in/" target="_blank">Soil Health Card</a></li>
        </ul>
      `;
    }

    if (type === "msp") {
      container.innerHTML = `
        <h3>MSP Rates</h3>
        <p>Wheat: ₹2275/qtl</p>
        <p>Rice: ₹2183/qtl</p>
      `;
    }

    if (type === "weather") {
      container.innerHTML = `
        <h3>Weather Update</h3>
        <p>Temperature: 34°C</p>
        <p>Condition: Sunny</p>
      `;
    }

  } catch (err) {
    container.innerHTML = "Error loading data";
  }
}
</script><button onclick="loadFarmerData('schemes')">Government Schemes</button>
<button onclick="loadFarmerData('msp')">MSP Rates</button>
<button onclick="loadFarmerData('weather')">Weather Updates</button>
