<!DOCTYPE html>
<html>
<head>
<title>MK Bharat Setu</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: #004aad;
  color: white;
  padding: 15px;
  text-align: center;
}

nav {
  background: #0066cc;
  padding: 10px;
  text-align: center;
}

nav a {
  color: white;
  margin: 10px;
  text-decoration: none;
  font-weight: bold;
}

.container {
  padding: 30px;
  text-align: center;
}

.card {
  display: inline-block;
  background: white;
  padding: 20px;
  margin: 10px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  background: #007bff;
  color: white;
  transform: scale(1.05);
}

.news-bar {
  background: black;
  color: white;
  padding: 10px;
}
</style>
</head>

<body>

<header>
  <h2>MK Bharat Setu</h2>
</header>

<nav>
  <a href="#">Farmer</a>
  <a href="#">Student</a>
  <a href="#">Business</a>
  <a href="#">Complaint</a>
</nav>

<div class="news-bar">
  <marquee>🚜 MSP Update | 📚 New Jobs | 📈 Market News | 🌦 Weather Alert</marquee>
</div>

<div class="container">

<h1>One Platform for Every Indian</h1>

<h2>Farmer Section</h2>

<div class="card" onclick="openLink('schemes')">Government Schemes</div>
<div class="card" onclick="openLink('msp')">MSP Rates</div>
<div class="card" onclick="openLink('weather')">Weather Updates</div>

</div>

<script>
function openLink(type) {
  let url = "";

  if (type === "schemes") {
    url = "https://pmkisan.gov.in/";
  }
  else if (type === "msp") {
    url = "https://agricoop.nic.in/";
  }
  else if (type === "weather") {
    url = "https://mausam.imd.gov.in/";
  }

  window.open(url, "_blank");
}
</script>

</body>
</html>
