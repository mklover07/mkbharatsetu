<!DOCTYPE html>
<html>
<head>
<title>MK Bharat Setu</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: #004aad;
  color: white;
  padding: 15px;
  text-align: center;
}

nav {
  background: #0066cc;
  padding: 10px;
  text-align: center;
}

nav a {
  color: white;
  margin: 10px;
  text-decoration: none;
  font-weight: bold;
}

.container {
  padding: 30px;
  text-align: center;
}

.card {
  display: inline-block;
  background: white;
  padding: 20px;
  margin: 10px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.3s;
}

.card:hover {
  background: #007bff;
  color: white;
  transform: scale(1.05);
}

.news-bar {
  background: black;
  color: white;
  padding: 10px;
}
</style>
</head>

<body>

<header>
  <h2>MK Bharat Setu</h2>
</header>

<nav>
  <a href="#">Farmer</a>
  <a href="#">Student</a>
  <a href="#">Business</a>
  <a href="#">Complaint</a>
</nav>

<div class="news-bar">
  <marquee>🚜 MSP Update | 📚 New Jobs | 📈 Market News | 🌦 Weather Alert</marquee>
</div>

<div class="container">

<h1>One Platform for Every Indian</h1>

<h2>Farmer Section</h2>

<div class="card" onclick="openLink('schemes')">Government Schemes</div>
<div class="card" onclick="openLink('msp')">MSP Rates</div>
<div class="card" onclick="openLink('weather')">Weather Updates</div>

</div>

<script>
function openLink(type) {
  let url = "";

  if (type === "schemes") {
    url = "https://pmkisan.gov.in/";
  }
  else if (type === "msp") {
    url = "https://agricoop.nic.in/";
  }
  else if (type === "weather") {
    url = "https://mausam.imd.gov.in/";
  }

  window.open(url, "_blank");
}
</script>

</body>
</html>
<script>

// 🔹 Farmer Data Loader
async function loadFarmerData(type) {

  let content = document.getElementById("dynamicContent");
  content.innerHTML = "Loading...";

  if(type === "schemes"){
    content.innerHTML = `
      <h3>Government Schemes</h3>
      <ul>
        <li><a href="https://pmkisan.gov.in/" target="_blank">PM Kisan Yojana</a></li>
        <li><a href="https://enam.gov.in/" target="_blank">e-NAM Portal</a></li>
      </ul>
    `;
  }

  else if(type === "msp"){
    content.innerHTML = `
      <h3>MSP Rates</h3>
      <p>Wheat: ₹2275/quintal</p>
      <p>Rice: ₹2183/quintal</p>
    `;
  }

  else if(type === "weather"){
    try {
      let res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=28.6&longitude=77.2&current_weather=true");
      let data = await res.json();

      content.innerHTML = `
        <h3>Weather Update</h3>
        <p>Temperature: ${data.current_weather.temperature}°C</p>
        <p>Wind Speed: ${data.current_weather.windspeed} km/h</p>
      `;
    } catch (err) {
      content.innerHTML = "Weather API error";
    }
  }

}

</script>
