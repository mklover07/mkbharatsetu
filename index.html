<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MK Bharat Setu</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#f5f7fa;
}

header {
  background: linear-gradient(90deg,#004aad,#007bff);
  color:#fff;
  padding:15px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}

nav {
  display:flex;
  justify-content:center;
  gap:20px;
  background:#0066cc;
  padding:10px;
}

nav a {
  color:white;
  text-decoration:none;
  font-weight:bold;
}

.hero {
  text-align:center;
  padding:40px;
}

.section {
  padding:20px;
  text-align:center;
}

.card {
  display:inline-block;
  background:white;
  padding:15px;
  margin:10px;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  cursor:pointer;
}

#newsFeed {
  background:black;
  color:white;
  padding:10px;
}

</style>
</head>

<body>

<header>MK Bharat Setu</header>

<nav>
  <a href="#">Farmer</a>
  <a href="#">Student</a>
  <a href="#">Business</a>
  <a href="#">Complaint</a>
</nav>

<!-- 🔴 LIVE NEWS -->
<div id="newsFeed">
  <marquee id="newsText">Loading news...</marquee>
</div>

<div class="hero">
  <h1>One Platform for Every Indian</h1>
  <p>Farmers • Students • Business • Public Support</p>
</div>

<!-- 🌾 FARMER -->
<div class="section">
  <h2>🌾 Farmer Section</h2>

  <div class="card" onclick="loadFarmerData('schemes')">Government Schemes</div>
  <div class="card" onclick="loadFarmerData('msp')">MSP Rates</div>
  <div class="card" onclick="loadWeather()">Weather Updates</div>

  <div id="farmerData" style="margin-top:20px;"></div>
</div>

<script>

// 🔹 Farmer Static + Dynamic
async function loadFarmerData(type) {
  const container = document.getElementById("farmerData");
  container.innerHTML = "Loading...";

  if (type === "schemes") {
    container.innerHTML = `
      <h3>Government Schemes</h3>
      <ul>
        <li><a href="https://pmkisan.gov.in/" target="_blank">PM Kisan</a></li>
        <li><a href="https://soilhealth.dac.gov.in/" target="_blank">Soil Health Card</a></li>
      </ul>
    `;
  }

  if (type === "msp") {
    container.innerHTML = `
      <h3>MSP Rates</h3>
      <p>Wheat: ₹2275/qtl</p>
      <p>Rice: ₹2183/qtl</p>
    `;
  }
}

// 🌦 WEATHER API
async function loadWeather() {
  const container = document.getElementById("farmerData");
  container.innerHTML = "Loading Weather...";

  try {
    const apiKey = "YOUR_API_KEY";  // 🔴 यहाँ अपनी API डालो
    const city = "Kota";

    const res = await fetch(
      `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric`
    );

    const data = await res.json();

    container.innerHTML = `
      <h3>🌦 Weather (${city})</h3>
      <p>Temp: ${data.main.temp}°C</p>
      <p>${data.weather[0].description}</p>
      <p>Humidity: ${data.main.humidity}%</p>
    `;
  } catch {
    container.innerHTML = "Weather failed";
  }
}

// 📰 NEWS API
async function loadNews() {
  try {
    const res = await fetch("https://api.currentsapi.services/v1/latest-news?apiKey=YOUR_NEWS_API");
    const data = await res.json();

    let headlines = data.news.map(n => n.title).join(" 🔴 ");

    document.getElementById("newsText").innerText = headlines;

  } catch {
    document.getElementById("newsText").innerText = "News failed";
  }
}

// Auto Load
loadNews();

// Auto Refresh
setInterval(loadNews, 60000);

</script>

</body>
</html>
